<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鄒族獵人文化寶庫</title>
  <style>
    :root{--bg1:#03120d;--bg2:#0a2a1f;--paper:#123629;--shadow:rgba(0,0,0,.35)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Noto Serif TC","Microsoft JhengHei",serif;background:radial-gradient(circle at 20% 50%,rgba(188,154,92,.14),transparent 26%),radial-gradient(circle at 80% 50%,rgba(188,154,92,.1),transparent 24%),linear-gradient(90deg,var(--bg1),var(--bg2) 50%,var(--bg1))}
    body{display:flex;align-items:center;justify-content:center;padding:18px}
    .viewer{position:relative;width:min(92vw,470px);aspect-ratio:9/16;perspective:2200px;display:flex;align-items:center;justify-content:center}
    .book{position:relative;width:100%;height:100%;transform-style:preserve-3d;filter:drop-shadow(0 28px 40px var(--shadow))}
    .page{position:absolute;inset:0;border-radius:18px;overflow:hidden;background:var(--paper);transform-origin:left center;transform-style:preserve-3d;backface-visibility:hidden;transition:transform 950ms cubic-bezier(.2,.72,.18,1),filter 950ms ease,box-shadow 950ms ease;box-shadow:0 10px 28px rgba(0,0,0,.28),inset 0 0 0 1px rgba(0,0,0,.04);cursor:pointer}
    .page::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:2;background:linear-gradient(90deg,rgba(0,0,0,.18),transparent 12%,transparent 78%,rgba(255,255,255,.18)),radial-gradient(circle at 0 50%,rgba(255,255,255,.18),transparent 22%);opacity:.42;transition:opacity 950ms ease}
    .page img{width:100%;height:100%;object-fit:contain;display:block;background:var(--paper);user-select:none;pointer-events:none}
    .page.flipped{transform:rotateY(-178deg);filter:brightness(.88);box-shadow:-16px 10px 30px rgba(0,0,0,.16),inset 0 0 0 1px rgba(0,0,0,.04)}
    .page.flipped::before{opacity:.66}
    .page.peek{animation:peek 2.1s ease-in-out infinite}
    @keyframes peek{0%,100%{transform:rotateY(0deg)}50%{transform:rotateY(-7deg)}}
    .page.turning-next{animation:turnNext 950ms cubic-bezier(.2,.72,.18,1)}
    .page.turning-prev{animation:turnPrev 950ms cubic-bezier(.2,.72,.18,1)}
    @keyframes turnNext{0%{transform:rotateY(0deg)}55%{transform:rotateY(-108deg) translateZ(6px)}100%{transform:rotateY(-178deg)}}
    @keyframes turnPrev{0%{transform:rotateY(-178deg)}55%{transform:rotateY(-72deg) translateZ(6px)}100%{transform:rotateY(0deg)}}
    .nav-zone{position:absolute;top:0;bottom:0;width:28%;z-index:50;cursor:pointer}
    .nav-zone.left{left:-6%}.nav-zone.right{right:-6%}
    @media (max-width:520px){body{padding:10px}.viewer{width:min(96vw,470px)}.nav-zone{width:34%}}
  </style>
</head>
